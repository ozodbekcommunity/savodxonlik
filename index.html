                    { title: "Xotirani kuchaytirish dasturlari", content: "Ma'lumotlarni yaxshi eslab qolish uchun Anki va Spaced Repetition (Interval takrorlash) tizimlari." },
                    { title: "Foydali odatlar shakllantirish", content: "Micro-learning, har kuni oz-ozdan o'rganish va habit-tracker'lardan foydalanish." },
                    { title: "Har qanday murakkab mavzularni o'rganish", content: "Feynman texnikasi: Murakkab mavzuni tushunish uchun uni yosh bolaga tushuntirgandek osonlashtirish." }
                ]
            },
            {
                id: 22,
                mainTitle: "Dunyoni onlayn organish",
                subtopics: [
                    { title: "Dunyoni ekrandan o'rganish", content: "Google Earth, virtual muzeylar va ta'lim platformalari orqali uydan chiqmay sayohat va ta'lim." },
                    { title: "Xaritalar bilan ishlash", content: "Google Maps, Yandex Maps dasturlaridan samarali foydalanish, lokatsiya ulashish va marshrut tuzish." }
                ]
            },
            {
                id: 23,
                mainTitle: "Rivojlanish va texnologiyalar",
                subtopics: [
                    { title: "Audiokitoblar va podkastlar dunyosi", content: "Vaqtdan unumli foydalanish maqsadida yo'lda yoki ish paytida audio kontent eshitish." },
                    { title: "Shaxsiy 'o'sish xaritasi' (roadmap)", content: "O'zining kelajakdagi rivojlanish rejasini bosqichma-bosqich tuzib chiqish." },
                    { title: "Zamonaviy texnologiyalar", content: "Hayotimizga endigina kirib kelayotgan innovatsion yechimlar haqida umumiy tushuncha." }
                ]
            },
            {
                id: 24,
                mainTitle: "Kelajak texnologiyalari",
                subtopics: [
                    { title: "Aqlli uylar (IoT)", content: "Internet of Things - buyumlar interneti. Uy jihozlarining bir-biri bilan aloqasi." },
                    { title: "AR va VR", content: "Kengaytirilgan (AR) va Virtual (VR) reallikning ta'lim va tibbiyotdagi o'rni." },
                    { title: "3D printerlar olami va Kosmik texnologiyalar", content: "Detallarni chop etish texnologiyalari va SpaceX kabi kompaniyalarning kosmosdagi yangiliklari." }
                ]
            },
            {
                id: 25,
                mainTitle: "Jamoaviy ishlash",
                subtopics: [
                    { title: "Jamoaviy ishlash qoidalari", content: "Trello, Slack, Google Docs kabi jamoaviy ishlash platformalarida umumiy loyihalarni boshqarish odobi va qoidalari." }
                ]
            }
        ];

        let currentLessonId = 1;

        // Sahifa yuklanganda bajariladigan ishlar
        document.addEventListener('DOMContentLoaded', () => {
            loadLesson(currentLessonId);
        });

        // Sidebar (menyu)ni chizish
        function renderSidebar() {
            const navContainer = document.getElementById('nav-container');
            navContainer.innerHTML = ''; // Tozalash

            lessonsData.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl transition-all duration-200 text-sm hover:bg-slate-50 focus:outline-none flex flex-col group nav-item-${lesson.id}`;
                btn.onclick = () => {
                    loadLesson(lesson.id);
                    // Mobilda menyuni yopish
                    if(window.innerWidth < 1024) {
                        toggleSidebar();
                    }
                };
                
                btn.innerHTML = `
                    <div class="flex items-start gap-3 w-full">
                        <div class="w-7 h-7 shrink-0 rounded-full flex items-center justify-center text-xs font-bold transition-colors ${lesson.id === currentLessonId ? 'bg-primary-100 text-primary-700' : 'bg-slate-100 text-slate-500 group-hover:bg-slate-200 group-hover:text-slate-700'}">
                            ${lesson.id}
                        </div>
                        <div class="flex-1 overflow-hidden pt-1">
                            <span class="block truncate w-full leading-tight ${lesson.id === currentLessonId ? 'text-primary-700 font-semibold' : 'text-slate-600 font-medium group-hover:text-slate-900'}">
                                ${lesson.mainTitle}
                            </span>
                        </div>
                    </div>
                `;
                
                navContainer.appendChild(btn);
            });
        }

        // Muayyan darsni ekranga yuklash
        function loadLesson(id) {
            // ID ni tekshirish
            if(id < 1 || id > lessonsData.length) return;
            
            const lesson = lessonsData.find(l => l.id === id);
            currentLessonId = lesson.id;

            // DOM elementlarini topish
            const badge = document.getElementById('lesson-number-badge');
            const title = document.getElementById('lesson-title');
            const subtopicsContainer = document.getElementById('subtopics-container');
            
            // Animatsiyani qayta ishga tushirish qismi
            const transitionElements = document.querySelectorAll('.content-transition');
            transitionElements.forEach(el => {
                el.classList.remove('animate-fade-in-up');
                void el.offsetWidth; // trigger reflow
                el.classList.add('animate-fade-in-up');
            });

            // Sarlavhalarni yangilash
            setTimeout(() => {
                badge.textContent = `${lesson.id}-DARS`;
                title.textContent = lesson.mainTitle;
                
                // Progress barni yangilash
                const progressPercentage = Math.round((lesson.id / lessonsData.length) * 100);
                document.getElementById('progress-bar').style.width = `${progressPercentage}%`;
                document.getElementById('progress-text').textContent = `${progressPercentage}%`;

                // Kichik mavzularni chizish
                subtopicsContainer.innerHTML = '';
                
                lesson.subtopics.forEach((sub, index) => {
                    const card = document.createElement('div');
                    card.className = "lesson-card bg-white p-6 md:p-8 rounded-2xl border border-slate-100 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] relative overflow-hidden group";
                    
                    // Dekorativ orqa fon ikonka (juda xira)
                    card.innerHTML += `
                        <div class="absolute -right-6 -top-6 text-slate-50 opacity-50 transform group-hover:scale-110 transition-transform duration-500 pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                        </div>
                        <div class="flex items-start gap-5 relative z-10">
                            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-primary-50 text-primary-600 flex items-center justify-center font-bold font-sans text-lg border border-primary-100 shadow-sm mt-1">
                                0${index + 1}
                            </div>
                            <div>
                                <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-3 leading-snug">${sub.title}</h3>
                                <p class="text-slate-600 text-lg leading-relaxed">${sub.content}</p>
                                
                                <button class="mt-5 text-sm font-bold font-sans text-primary-600 hover:text-primary-800 flex items-center gap-1.5 transition-colors group/btn">
                                    O'qishni boshlash
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover/btn:translate-x-1.5 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                    subtopicsContainer.appendChild(card);
                });

                // Tugmalar holatini yangilash
                document.getElementById('prev-btn').disabled = (id === 1);
                document.getElementById('next-btn').disabled = (id === lessonsData.length);

                // Menyudagi aktiv holatni yangilash
                updateActiveState(id);
                
                // Yuqoriga qaytarish smoothly
                document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
            }, 50); // Animatsiya boshlanishiga ozgina vaqt berish
        }

        // Menyudagi aktiv dars ranglarini yangilash
        function updateActiveState(id) {
            // Sidebar ro'yxatini to'liq qayta chizib qo'yish eng toza usul
            renderSidebar();
            
            setTimeout(() => {
                const activeItem = document.querySelector(`.nav-item-${id}`);
                if(activeItem) {
                    activeItem.scrollIntoView({ behavior: "smooth", block: "center" });
                }
            }, 100);
        }

        // Mobil menyu uchun ochish/yopish funksiyasi
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if(sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                // Sal kuttirib opacity qo'shish animatsiya uchun
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }
    </script>
</body>
</html>
